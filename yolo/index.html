<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Models - Terrarium Data</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --zip-color: #e67e22;
            --success-color: #2ecc71;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .back-link {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .model-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
        }

        .model-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12);
        }

        .model-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            word-break: break-all;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .section-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #718096;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .action-group {
            margin-bottom: 20px;
        }

        .action-group:last-child {
            margin-bottom: 0;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-copy {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-copy:hover {
            background-color: #2980b9;
            filter: brightness(1.1);
        }

        .btn-copy-zip {
            background-color: var(--zip-color);
            color: white;
        }

        .btn-copy-zip:hover {
            background-color: #d35400;
            filter: brightness(1.1);
        }

        .btn.copied {
            background-color: var(--success-color) !important;
        }

        .btn-download {
            background-color: #f1f5f9;
            color: #475569;
        }

        .btn-download:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .show-toast {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .model-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← Quay lại trang chủ</a>
        <header>
            <h1>YOLO Models Repository</h1>
            <p>Danh sách các model YOLO được tối ưu hóa cho CoreML (.mlpackage & .zip)</p>
        </header>

        <div class="model-grid" id="modelGrid">
            <!-- Models will be populated here -->
        </div>
    </div>

    <div id="toast" class="toast">Đã sao chép liên kết!</div>

    <script>
        const models = [
            { name: "yolo11l-int8.mlpackage", hasZip: false },
            { name: "yolo11l.mlpackage", hasZip: true },
            { name: "yolo11m-int8.mlpackage", hasZip: false },
            { name: "yolo11m.mlpackage", hasZip: true },
            { name: "yolo11n-int8.mlpackage", hasZip: false },
            { name: "yolo11n.mlpackage", hasZip: true },
            { name: "yolo11s-int8.mlpackage", hasZip: false },
            { name: "yolo11s.mlpackage", hasZip: true },
            { name: "yolo11x-int8.mlpackage", hasZip: false },
            { name: "yolo11x.mlpackage", hasZip: true }
        ];

        const modelGrid = document.getElementById('modelGrid');
        const toast = document.getElementById('toast');
        const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show-toast');
            setTimeout(() => {
                toast.classList.remove('show-toast');
            }, 2000);
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = btn.innerHTML;
                btn.innerHTML = '✓ Đã chép';
                btn.classList.add('copied');
                showToast('Đã sao chép liên kết vào bộ nhớ tạm!');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Không thể sao chép: ', err);
                showToast('Lỗi khi sao chép!');
            });
        }

        models.forEach(model => {
            const card = document.createElement('div');
            card.className = 'model-card';
            
            const pkgUrl = baseUrl + model.name;
            const zipName = model.name + ".zip";
            const zipUrl = baseUrl + zipName;
            
            let zipSection = '';
            if (model.hasZip) {
                zipSection = `
                    <div class="section-label">Nén (.zip)</div>
                    <div class="actions">
                        <button class="btn btn-copy-zip" onclick="copyToClipboard('${zipUrl}', this)">📋 Link ZIP</button>
                        <a href="${zipName}" class="btn btn-download" download>💾 Tải ZIP</a>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="model-name">${model.name}</div>
                
                <div class="action-group">
                    <div class="section-label">Thư mục (.mlpackage)</div>
                    <div class="actions">
                        <button class="btn btn-copy" onclick="copyToClipboard('${pkgUrl}', this)">📋 Link Gốc</button>
                        <a href="${model.name}" class="btn btn-download">📂 Xem thư mục</a>
                    </div>
                </div>

                <div class="action-group">
                    ${zipSection}
                </div>
            `;
            
            modelGrid.appendChild(card);
        });
    </script>
</body>
</html>
